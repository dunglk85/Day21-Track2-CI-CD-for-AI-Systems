name: MLOps Pipeline

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:

  # JOB 1: Chay unit tests tren du lieu ao
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  # JOB 2: Huan luyen mo hinh, upload artifact len cloud storage
  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}
    env:
      MLFLOW_TRACKING_URI: https://dagshub.com/${{ secrets.DAGSHUB_USERNAME }}/Day21-Track2-CI-CD-for-AI-Systems.mlflow
      MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to Cloud Storage
        run: |
          echo '${{ secrets.CLOUD_CREDENTIALS }}' > /tmp/sa-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json" >> $GITHUB_ENV

      - name: Pull data with DVC
        run: |
          dvc remote modify myremote credentialpath /tmp/sa-key.json
          dvc pull

      - name: Train model
        run: python src/train.py

      - name: Read metrics
        id: read_metrics
        run: |
          acc=$(python -c "import json; print(json.load(open('outputs/metrics.json'))['accuracy'])")
          echo "accuracy=$acc" >> $GITHUB_OUTPUT

      - name: Upload model to Cloud Storage
        run: |
          python - <<'EOF'
          import os
          from google.cloud import storage
          
          bucket_name = "${{ secrets.CLOUD_BUCKET }}"
          source_file = "models/model.pkl"
          destination_blob = "models/latest/model.pkl"
          
          client = storage.Client()
          bucket = client.bucket(bucket_name)
          blob = bucket.blob(destination_blob)
          blob.upload_from_filename(source_file)
          print(f"Uploaded {source_file} to {destination_blob}")
          EOF

      - name: Save metrics as artifact
        uses: actions/upload-artifact@v4
        with:
          name: performance-reports
          path: |
            outputs/metrics.json
            outputs/report.txt

      - name: Display Performance Report
        run: cat outputs/report.txt

  # JOB 3: Kiem tra chat luong - chi cho phep deploy khi accuracy >= 0.70
  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    steps:
      - name: Check eval gate
        run: |
          python - <<'EOF'
          import sys
          accuracy = float("${{ needs.train.outputs.accuracy }}")
          threshold = 0.7
          print(f"Current Accuracy: {accuracy}")
          if accuracy < threshold:
              print(f"FAILED: Accuracy {accuracy} is below threshold {threshold}")
              sys.exit(1)
          print("PASSED: Accuracy meets threshold.")
          EOF

  # JOB 4: Trien khai sau khi eval gate qua
  deploy:
    name: Deploy
    needs: eval
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            # Di chuyen vao thu muc project (neu co) hoac dam bao moi truong
            # Cai dat/Cap nhat dependencies de tranh loi thieu thu vien
            pip install --user -r requirements.txt || echo "Warning: pip install failed"
            
            # Restart service
            sudo systemctl restart mlops-serve
            
            # Doi server khoi dong (tang len 10s vi phai tai mo hinh tu GCS)
            sleep 10
            
            # Kiem tra health check, neu loi thi in log ra de debug
            curl -f http://localhost:8000/health || (sudo journalctl -u mlops-serve -n 50 --no-pager && exit 1)
