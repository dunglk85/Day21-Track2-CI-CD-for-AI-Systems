name: MLOps Pipeline

on:
  push:
    branches: [main, master]
    paths:
      - "**/*.py"
      - "requirements.txt"
      - ".github/workflows/mlops.yml"
  workflow_dispatch:

jobs:

  # JOB 1: Chay unit tests tren du lieu ao
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  # JOB 2: Kiem tra chat luong du lieu bang Great Expectations
  # Chay TRUOC train de chan som du lieu loi, tranh lang phi compute train
  validate_data:
    name: Validate Data
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install great_expectations

      - name: Authenticate to Cloud Storage
        run: |
          echo '${{ secrets.CLOUD_CREDENTIALS }}' > /tmp/sa-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json" >> $GITHUB_ENV

      - name: Pull data with DVC
        run: |
          dvc remote modify myremote credentialpath /tmp/sa-key.json
          dvc pull

      - name: Run Great Expectations validation
        run: python validate_data.py

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: data-validation-report
          path: gx/uncommitted/

  # JOB 3: Huan luyen mo hinh, upload artifact len cloud storage
  train:
    name: Train
    needs: validate_data
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}
      model_version: ${{ steps.version.outputs.model_version }}
      model_registry_version: ${{ steps.train.outputs.model_registry_version }}
    env:
      MLFLOW_TRACKING_URI: https://dagshub.com/${{ secrets.DAGSHUB_USERNAME }}/Day21-Track2-CI-CD-for-AI-Systems.mlflow
      MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install scikit-learn joblib

      - name: Authenticate to Cloud Storage
        run: |
          echo '${{ secrets.CLOUD_CREDENTIALS }}' > /tmp/sa-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json" >> $GITHUB_ENV

      - name: Pull data with DVC
        run: |
          dvc remote modify myremote credentialpath /tmp/sa-key.json
          dvc pull

      # Bonus 5: Canh bao lech lac du lieu - chay TRUOC khi train
      - name: Check data distribution (imbalance warning)
        run: python check_data_distribution.py

      - name: Train model
        id: train
        run: |
          output=$(python src/train.py)
          echo "$output"
          version=$(echo "$output" | grep -oP 'REGISTERED_MODEL_VERSION=\K\d+')
          echo "model_registry_version=$version" >> "$GITHUB_OUTPUT"

      # Bonus 3 + 5: Tao confusion matrix, precision/recall theo lop,
      # va gop phan phoi nhan (tu buoc tren) vao outputs/metrics.json
      - name: Generate performance report
        run: python generate_report.py

      - name: Read metrics
        id: read_metrics
        run: |
          acc=$(python -c "import json; print(json.load(open('outputs/metrics.json'))['accuracy'])")
          echo "accuracy=$acc" >> $GITHUB_OUTPUT

      # Tao version id duy nhat cho lan train nay, dung de truy vet va rollback sau nay
      - name: Generate model version tag
        id: version
        run: |
          version="$(date +%Y%m%d%H%M%S)-${GITHUB_SHA::8}"
          echo "model_version=$version" >> $GITHUB_OUTPUT
          echo "Model version: $version"

      # Upload model theo 2 duong dan: 1 ban co version rieng (immutable, dung de rollback)
      # va 1 ban "latest" (mutable, VM se pull ban nay khi deploy)
      - name: Upload model to Cloud Storage
        run: |
          python - <<EOF
          import os
          from google.cloud import storage

          bucket_name = "${{ secrets.CLOUD_BUCKET }}"
          source_file = "models/model.pkl"
          version = "${{ steps.version.outputs.model_version }}"

          client = storage.Client()
          bucket = client.bucket(bucket_name)

          # Ban immutable theo version - khong bao gio bi ghi de, dung de rollback
          versioned_blob = bucket.blob(f"models/versions/{version}/model.pkl")
          versioned_blob.upload_from_filename(source_file)
          print(f"Uploaded {source_file} to models/versions/{version}/model.pkl")

          # Ban "latest" - VM se pull ban nay
          latest_blob = bucket.blob("models/latest/model.pkl")
          latest_blob.upload_from_filename(source_file)
          print(f"Uploaded {source_file} to models/latest/model.pkl")
          EOF

      - name: Save metrics as artifact
        uses: actions/upload-artifact@v4
        with:
          name: performance-reports
          path: |
            outputs/metrics.json
            outputs/report.txt

      - name: Display Performance Report
        run: cat outputs/report.txt

  # JOB 4: Kiem tra chat luong - chi cho phep deploy khi accuracy >= 0.70
  # VA khi model moi (challenger) tot hon hoac bang model dang chay san xuat (champion)
  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    env:
      MLFLOW_TRACKING_URI: https://dagshub.com/${{ secrets.DAGSHUB_USERNAME }}/Day21-Track2-CI-CD-for-AI-Systems.mlflow
      MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install mlflow

      # Can lai file metrics.json vua duoc tao trong job "train"
      - name: Download metrics artifact from train job
        uses: actions/download-artifact@v4
        with:
          name: performance-reports
          path: outputs/

      # Bonus 4: So sanh challenger vs champion tu MLflow Model Registry (@champion alias)
      # Day la nguon su that duy nhat — thay cho ca tag is_best_model lan file JSON tren GCS.
      - name: Check safety gate (Champion vs Challenger)
        run: |
          python - <<'EOF'
          import sys
          import os
          import yaml
          import mlflow

          MLFLOW_MODEL_NAME = "wine_quality_model"
          CHAMPION_ALIAS = "champion"

          current_acc = float("${{ needs.train.outputs.accuracy }}")

          try:
              params = yaml.safe_load(open("params.yaml"))
              threshold = float(params.get("eval_threshold", 0.70))
          except Exception:
              threshold = 0.70

          print(f"Challenger (New Model) Accuracy: {current_acc}")

          # 1. Global threshold gate
          if current_acc < threshold:
              print(f"FAILED: Accuracy {current_acc} is below global threshold {threshold}")
              sys.exit(1)

          # 2. Tra cuu champion tu MLflow Model Registry qua alias @champion
          try:
              client = mlflow.tracking.MlflowClient()
              champion_version = client.get_model_version_by_alias(
                  MLFLOW_MODEL_NAME, CHAMPION_ALIAS
              )
              champion_run_id = champion_version.run_id
              champion_run = client.get_run(champion_run_id)
              prev_acc = champion_run.data.metrics.get("accuracy")
              print(f"Champion (@champion) Accuracy: {prev_acc}")
          except Exception as e:
              print(f"No @champion found in Model Registry. Treating current model as first champion. ({e})")
              sys.exit(0)

          if current_acc >= prev_acc:
              diff = current_acc - prev_acc
              print(f"PASSED: Challenger ({current_acc}) >= Champion ({prev_acc}). Diff: +{diff}")
          else:
              diff = prev_acc - current_acc
              print(f"FAILED: Challenger ({current_acc}) < Champion ({prev_acc}). Drop: -{diff}")
              sys.exit(1)
          EOF

  # JOB 5: Trien khai sau khi eval gate qua
  # Co pull model moi ve VM, backup ban dang chay, va tu dong rollback neu health check fail
  deploy:
    name: Deploy
    needs: [train, eval]
    runs-on: ubuntu-latest
    env:
      MODEL_VERSION: ${{ needs.train.outputs.model_version }}
      MLFLOW_TRACKING_URI: https://dagshub.com/${{ secrets.DAGSHUB_USERNAME }}/Day21-Track2-CI-CD-for-AI-Systems.mlflow
      MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # Can lai metrics.json de dung cho buoc cap nhat production baseline ben duoi
      - name: Download metrics artifact from train job
        uses: actions/download-artifact@v4
        with:
          name: performance-reports
          path: outputs/

      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: MODEL_VERSION, CLOUD_CREDENTIALS
          script: |
            set -e

            echo "$CLOUD_CREDENTIALS" > /tmp/sa-key.json
            export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json

            APP_DIR="/opt/mlops-serve"
            MODEL_DIR="$APP_DIR/models"
            LATEST_LINK="$MODEL_DIR/current"
            NEW_MODEL_DIR="$MODEL_DIR/$MODEL_VERSION"

            cd "$APP_DIR"

            # 1. Ghi lai version dang chay de co the rollback neu can
            PREV_VERSION=""
            if [ -L "$LATEST_LINK" ]; then
              PREV_VERSION=$(basename "$(readlink -f "$LATEST_LINK")")
              echo "Current running version: $PREV_VERSION"
            fi

            # 2. Cai dependencies - fail cung neu loi, khong am tham bo qua
            pip install --user -r requirements.txt

            # 3. Tai model moi ve VM (ban immutable theo version, khong phai 'latest')
            mkdir -p "$NEW_MODEL_DIR"
            gsutil cp "gs://${{ secrets.CLOUD_BUCKET }}/models/versions/$MODEL_VERSION/model.pkl" \
              "$NEW_MODEL_DIR/model.pkl"

            # 4. Chuyen symlink 'current' sang version moi (atomic switch)
            ln -sfn "$NEW_MODEL_DIR" "$LATEST_LINK"

            # 5. Restart service de load model moi
            sudo systemctl restart mlops-serve
            sleep 10

            # 6. Health check - neu fail thi tu dong rollback ve version cu
            HEALTH_OK=false
            for i in {1..12}; do
              if curl -f http://localhost:8000/health; then
                HEALTH_OK=true
                break
              fi
              echo "Waiting for service to start..."
              sleep 5
            done

            if [ "$HEALTH_OK" = false ]; then
              echo "Health check FAILED for version $MODEL_VERSION"
              sudo journalctl -u mlops-serve -n 50 --no-pager

              if [ -n "$PREV_VERSION" ]; then
                echo "Rolling back to previous version: $PREV_VERSION"
                ln -sfn "$MODEL_DIR/$PREV_VERSION" "$LATEST_LINK"
                sudo systemctl restart mlops-serve
                sleep 10
                if curl -f http://localhost:8000/health; then
                  echo "Rollback successful. Service running on $PREV_VERSION."
                else
                  echo "CRITICAL: Rollback also failed. Manual intervention required."
                fi
              else
                echo "No previous version available to roll back to."
              fi

              exit 1
            fi

            echo "Deploy successful. Service running on version $MODEL_VERSION."

      # Danh dau model nay la champion trong MLflow Registry sau khi deploy THANH CONG.
      # @champion la nguon su that duy nhat cho champion-challenger comparison.
      - name: Promote to champion in MLflow Registry
        run: |
          pip install mlflow
          python -c "
          import mlflow
          client = mlflow.tracking.MlflowClient()
          client.set_registered_model_alias(
              'wine_quality_model',
              'champion',
              ${{ needs.train.outputs.model_registry_version }}
          )
          print('Promoted version ${{ needs.train.outputs.model_registry_version }} to @champion')
          "
